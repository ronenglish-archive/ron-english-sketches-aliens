<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alien Cherub | Ron English Catalogue Raisonné</title>

  <link rel="stylesheet" href="../../css/styles.css" />

  <style>
    :root{
      --border:#e5e7eb;
      --muted:#4b5563;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:18px;
      --bg:#ffffff;
      --panel:#f3f4f6;
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:#111;
      background:var(--bg);
      padding-left:0;
      padding-right:0;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:28px 18px 60px;
    }

    .nav-pills{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:22px;
      margin-bottom:22px;
    }

    .nav-pill{
      padding:8px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      color:#111;
      text-decoration:none;
      font-size:14px;
    }

    .nav-pill:hover{
      background:#f9fafb;
    }

    .page-header{
      max-width:1100px;
      margin:0 0 28px;
      padding:0;
      text-align:left;
    }

    .page-title{
      margin:0;
      font-size:clamp(2rem,4vw,3rem);
      letter-spacing:-.02em;
      line-height:1.05;
    }

    .section-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:24px;
    }

    .section-card h2{
      margin:0 0 18px;
      font-size:1.4rem;
    }

    .originals-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .gallery-item{
      display:block;
      text-decoration:none;
      color:inherit;
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease;
      box-shadow:0 4px 18px rgba(0,0,0,.04);
    }

    .gallery-item:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    .gallery-item img{
      display:block;
      width:100%;
      object-fit:contain;
      background:var(--panel);
      padding:8px;
    }

    .originals-grid .gallery-item img{
      height:340px;
    }

    .gallery-grid .gallery-item img{
      height:280px;
    }

    .back-link{
      margin-top:28px;
    }

    .back-link a{
      display:inline-block;
      text-decoration:none;
      color:#111;
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 16px;
      background:#fff;
    }

    .back-link a:hover{
      background:#f9fafb;
    }

    @media (max-width:640px){
      .wrap{
        padding:22px 14px 50px;
      }

      .originals-grid .gallery-item img{
        height:300px;
      }

      .gallery-grid .gallery-item img{
        height:240px;
      }
    }
  
    /* BEGIN SKETCHES CENTERING OVERRIDES */
    .nav-pills{
      justify-content:center;
      text-align:center;
    }

    .page-header{
      text-align:center;
      margin-left:auto;
      margin-right:auto;
    }

    .page-title,
    h1.page-title{
      text-align:center;
    }

    .intro-text{
      text-align:center;
      margin-left:auto;
      margin-right:auto;
    }

    .intro-text p{
      text-align:center;
      margin-left:auto;
      margin-right:auto;
    }

    .section-card h2,
    .section-card h3{
      text-align:center;
    }

    .section-intro{
      text-align:center;
      margin-left:auto;
      margin-right:auto;
    }

    .entry-body{
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .entry-body h3,
    .entry-body p,
    .work-title,
    .work-subtitle,
    .image-caption,
    .gallery-item .entry-body .work-title,
    .gallery-item .entry-body .work-subtitle,
    .gallery-item .entry-body .work-note{
      text-align:center;
      width:100%;
    }

    footer{
      text-align:center;
    }

    .back-link{
      text-align:left;
    }

    .back-link a{
      text-align:left;
    }
    /* END SKETCHES CENTERING OVERRIDES */
  </style>
</head>
<body>
  <main class="wrap">
    <nav class="nav-pills" aria-label="Site navigation">
      <a class="nav-pill" href="https://ronenglish-archive.github.io/ron-english-catalogue-raisonne/">Catalogue home</a>
      <a class="nav-pill" href="../index.html">Sketches</a></nav>

    <header class="page-header">
      <h1 class="page-title">Alien Cherub</h1>
    </header>

    <section class="section-card" aria-labelledby="original-sketches">
      <h2 id="original-sketches">Original Drawings</h2>

      <div class="originals-grid">
        <a class="gallery-item" href="../../images/Sketches/aliens/Alien cherub ORIGINAL.jpg">
          <img src="../../images/Sketches/aliens/Alien cherub ORIGINAL.jpg" alt="Alien Cherub front original sketch by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien cherub three quarters ORIGINAL.jpg">
          <img src="../../images/Sketches/aliens/Alien cherub three quarters ORIGINAL.jpg" alt="Alien Cherub three-quarters original sketch by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien cherub back ORIGINAL.jpg">
          <img src="../../images/Sketches/aliens/Alien cherub back ORIGINAL.jpg" alt="Alien Cherub back original sketch by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien cherub side ORIGINAL.jpg">
          <img src="../../images/Sketches/aliens/Alien cherub side ORIGINAL.jpg" alt="Alien Cherub side original sketch by Ron English" loading="lazy" />
        </a>
      </div>
    </section>

    <section class="section-card" aria-labelledby="digitized-versions">
      <h2 id="digitized-versions">Digitized Versions</h2>

      <div class="gallery-grid">
        <a class="gallery-item" href="../../images/Sketches/aliens/Alien Cherub front B&W.jpg">
          <img src="../../images/Sketches/aliens/Alien Cherub front B&W.jpg" alt="Alien Cherub front digitized B&amp;W version by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien Cherub three quarters B&W.jpg">
          <img src="../../images/Sketches/aliens/Alien Cherub three quarters B&W.jpg" alt="Alien Cherub three-quarters digitized B&amp;W version by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien Cherub back B&W.jpg">
          <img src="../../images/Sketches/aliens/Alien Cherub back B&W.jpg" alt="Alien Cherub back digitized B&amp;W version by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien cherub front COLOR.jpg">
          <img src="../../images/Sketches/aliens/Alien cherub front COLOR.jpg" alt="Alien Cherub front digitized color version by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien cherub three quarters COLOR.jpg">
          <img src="../../images/Sketches/aliens/Alien cherub three quarters COLOR.jpg" alt="Alien Cherub three-quarters digitized color version by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien cherub back COLOR.jpg">
          <img src="../../images/Sketches/aliens/Alien cherub back COLOR.jpg" alt="Alien Cherub back digitized color version by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien cherub side COLOR.jpg">
          <img src="../../images/Sketches/aliens/Alien cherub side COLOR.jpg" alt="Alien Cherub side digitized color version by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien Cherub three quarters colorway 2.jpg">
          <img src="../../images/Sketches/aliens/Alien Cherub three quarters colorway 2.jpg" alt="Alien Cherub three-quarters colorway 2 by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien Cherub three quarters colorway 3.jpg">
          <img src="../../images/Sketches/aliens/Alien Cherub three quarters colorway 3.jpg" alt="Alien Cherub three-quarters colorway 3 by Ron English" loading="lazy" />
        </a>

        <a class="gallery-item" href="../../images/Sketches/aliens/Alien Cherub three quarters colorway 4.jpg">
          <img src="../../images/Sketches/aliens/Alien Cherub three quarters colorway 4.jpg" alt="Alien Cherub three-quarters colorway 4 by Ron English" loading="lazy" />
        </a>
      </div>
    </section>

    <div class="back-link">
      <a href="index.html">← Back to Aliens</a>
    </div>
  </main>
</body>
</html>
